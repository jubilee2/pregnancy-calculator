<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDD Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 20px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
        }
        h2 {
            text-align: center;
            color: #333;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .hint {
            margin-top: 5px;
            color: #666;
            font-size: 0.9em;
            text-align: center;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            background-color: #e9ecef;
            border-radius: 4px;
            text-align: center;
            font-weight: bold;
            color: #333;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>EDD Calculator</h2>
    <div class="form-group">
        <label for="refDate">Reference Date (yyyy-mm-dd)</label>
        <input type="text" id="refDate" placeholder="yyyy-mm-dd" pattern="\d{4}-\d{2}-\d{2}" required>
    </div>
    <div class="form-group">
        <label for="weeks">Weeks Pregnant</label>
        <input type="number" id="weeks" min="0" max="42" placeholder="e.g., 12" required>
    </div>
    <div class="form-group">
        <label for="days">Days Pregnant</label>
        <input type="number" id="days" min="0" max="6" placeholder="e.g., 3" required>
    </div>
    <p class="hint">Enter a reference date, weeks, and days to calculate automatically.</p>
    <div class="result" id="resultDiv" aria-live="polite">
        <span id="eddOutput"></span>
    </div>
</div>

<script>
    const refDateInput = document.getElementById('refDate');
    const weeksInput = document.getElementById('weeks');
    const daysInput = document.getElementById('days');
    const resultDiv = document.getElementById('resultDiv');
    const eddOutput = document.getElementById('eddOutput');

    function hideResult() {
        eddOutput.innerHTML = '';
        resultDiv.style.display = 'none';
    }

    function showResult(message) {
        eddOutput.innerHTML = message;
        resultDiv.style.display = 'block';
    }

    function calculateEDD() {
        const dateInput = refDateInput.value.trim();
        const weeksValue = weeksInput.value;
        const daysValue = daysInput.value;

        if (!dateInput && weeksValue === '' && daysValue === '') {
            hideResult();
            return;
        }

        if (!dateInput || weeksValue === '' || daysValue === '') {
            showResult('Enter all three fields to see your Estimated Due Date.');
            return;
        }

        const dateRegex = /^\d{4}-\d{2}-\d{2}$/;
        if (!dateRegex.test(dateInput)) {
            showResult('Please enter the date in yyyy-mm-dd format.');
            return;
        }

        // Parse as a local date to avoid timezone offset issues.
        const [dateYear, dateMonth, dateDay] = dateInput.split('-').map(Number);
        const refDate = new Date(dateYear, dateMonth - 1, dateDay);
        if (
            isNaN(refDate.getTime()) ||
            refDate.getFullYear() !== dateYear ||
            refDate.getMonth() !== dateMonth - 1 ||
            refDate.getDate() !== dateDay
        ) {
            showResult('Please enter a valid date.');
            return;
        }

        const weeks = parseInt(weeksValue, 10);
        const days = parseInt(daysValue, 10);
        if (Number.isNaN(weeks) || weeks < 0 || weeks > 42) {
            showResult('Weeks pregnant must be between 0 and 42.');
            return;
        }

        if (Number.isNaN(days) || days < 0 || days > 6) {
            showResult('Days pregnant must be between 0 and 6.');
            return;
        }

        // Calculate days to subtract: (week * 7 + days)
        const daysPregnant = (weeks * 7) + days;

        // 40 weeks = 280 days
        // Logic: date - (week*7 + days) + 40 weeks
        // In days: date - daysPregnant + 280
        const totalDaysToAdd = 280 - daysPregnant;

        // Apply to date
        const eddDate = new Date(refDate);
        eddDate.setDate(eddDate.getDate() + totalDaysToAdd);

        // Format output to yyyy-mm-dd
        const year = eddDate.getFullYear();
        const month = String(eddDate.getMonth() + 1).padStart(2, '0');
        const day = String(eddDate.getDate()).padStart(2, '0');
        const formattedDate = `${year}-${month}-${day}`;

        showResult(`Your Estimated Due Date is:<br><br><span style="color:#007BFF; font-size: 1.2em;">${formattedDate}</span>`);
    }

    [refDateInput, weeksInput, daysInput].forEach((input) => {
        input.addEventListener('input', calculateEDD);
    });
    hideResult();
</script>

</body>
</html>

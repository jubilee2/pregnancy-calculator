<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDD Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 20px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
        }
        h2 {
            text-align: center;
            color: #333;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            background-color: #e9ecef;
            border-radius: 4px;
            text-align: center;
            font-weight: bold;
            color: #333;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>EDD Calculator</h2>
    <div class="form-group">
        <label for="refDate">Reference Date (yyyy-mm-dd)</label>
        <input type="text" id="refDate" placeholder="yyyy-mm-dd" pattern="\d{4}-\d{2}-\d{2}" required oninput="calculateEDD()">
    </div>
    <div class="form-group">
        <label for="weeks">Weeks Pregnant</label>
        <input type="number" id="weeks" min="0" max="42" placeholder="e.g., 12" required oninput="calculateEDD()">
    </div>
    <div class="form-group">
        <label for="days">Days Pregnant</label>
        <input type="number" id="days" min="0" max="6" placeholder="e.g., 3" required oninput="calculateEDD()">
    </div>
    <div class="result" id="resultDiv">
        <span id="eddOutput"></span>
    </div>
</div>

<script>
    function calculateEDD() {
        const resultDiv = document.getElementById('resultDiv');
        const dateInput = document.getElementById('refDate').value;
        const weeksInput = document.getElementById('weeks').value;
        const daysInput = document.getElementById('days').value;
        
        if (!dateInput || weeksInput === '' || daysInput === '') {
            resultDiv.style.display = 'none';
            return;
        }

        const dateRegex = /^\d{4}-\d{2}-\d{2}$/;
        if (!dateRegex.test(dateInput)) {
            resultDiv.style.display = 'none';
            return;
        }

        // When a date is parsed like "YYYY-MM-DD", it assumes UTC.
        // It's safer to split the string or append time to avoid timezone offset issues.
        // Or simply use new Date(dateInput + 'T00:00:00');
        const refDate = new Date(dateInput + 'T00:00:00');
        if (isNaN(refDate.getTime())) {
            resultDiv.style.display = 'none';
            return;
        }
        const weeks = parseInt(weeksInput, 10);
        const days = parseInt(daysInput, 10);

        // Calculate days to subtract: (week * 7 + days)
        const daysPregnant = (weeks * 7) + days;
        
        // 40 weeks = 280 days
        // Logic: date - (week*7 + days) + 40 weeks
        // In days: date - daysPregnant + 280
        const totalDaysToAdd = 280 - daysPregnant;

        // Apply to date
        const eddDate = new Date(refDate);
        eddDate.setDate(eddDate.getDate() + totalDaysToAdd);

        // Format output to yyyy-mm-dd
        const year = eddDate.getFullYear();
        const month = String(eddDate.getMonth() + 1).padStart(2, '0');
        const day = String(eddDate.getDate()).padStart(2, '0');
        const formattedDate = `${year}-${month}-${day}`;

        const eddOutput = document.getElementById('eddOutput');

        eddOutput.innerHTML = `Your Estimated Due Date is:<br><br><span style="color:#007BFF; font-size: 1.2em;">${formattedDate}</span>`;
        resultDiv.style.display = 'block';
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pregnancy & Due Date Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="container">
        <h2>Pregnancy & Due Date Calculator</h2>
        <div class="form-group">
            <label for="refDate" id="refDateLabel">Reference Date</label>
            <input type="date" id="refDate" required>
        </div>
        <div class="form-group">
            <label>Calculation Mode</label>
            <div class="button-group">
                <button type="button" id="refBtn" class="active">Reference Date</button>
                <button type="button" id="eddBtn">EDD</button>
                <button type="button" id="lmpBtn">LMP</button>
            </div>
        </div>
        <div class="form-group">
            <label for="weeks">Weeks Pregnant</label>
            <input type="number" id="weeks" min="0" max="42" placeholder="e.g., 12" required>
        </div>
        <div class="form-group">
            <label for="days">Days Pregnant</label>
            <input type="number" id="days" min="0" max="6" placeholder="e.g., 3" required>
        </div>
        <div class="form-group">
            <label for="actualDate">Actual Delivery Date (Optional)</label>
            <input type="date" id="actualDate">
        </div>
        <p class="hint">Enter a reference date, weeks, and days to calculate automatically.</p>
        <div class="result" id="resultDiv" aria-live="polite">
            <span id="eddOutput"></span>
            <div id="timelineContainer"></div>
        </div>
    </div>

    <script>
        const $ = id => document.getElementById(id);
        const [refDateInput, refDateLabel, weeksInput, daysInput, actualDateInput, resultDiv, eddOutput, refBtn, lmpBtn, eddBtn, timelineContainer] =
            ['refDate', 'refDateLabel', 'weeks', 'days', 'actualDate', 'resultDiv', 'eddOutput', 'refBtn', 'lmpBtn', 'eddBtn', 'timelineContainer'].map($);

        const hideResult = () => {
            eddOutput.innerHTML = '';
            if (timelineContainer) timelineContainer.innerHTML = '';
            resultDiv.style.display = 'none';
        };

        const showResult = message => {
            eddOutput.innerHTML = message;
            resultDiv.style.display = 'block';
        };

        function calculateEDD() {
            const [dateInput, weeksValue, daysValue] = [refDateInput.value, weeksInput.value, daysInput.value];

            if (!dateInput && !weeksValue && !daysValue) return hideResult();

            if (!dateInput || !weeksValue || !daysValue) {
                return showResult(
                    lmpBtn.classList.contains('active') ? 'Please enter your LMP Date.' :
                    eddBtn.classList.contains('active') ? 'Please enter your EDD.' :
                    'Enter all three fields to see your Estimated Due Date.'
                );
            }

            const [dateYear, dateMonth, dateDay] = dateInput.split('-').map(Number);
            const refDate = new Date(dateYear, dateMonth - 1, dateDay);

            const weeks = parseInt(weeksValue, 10);
            const days = parseInt(daysValue, 10);
            if (weeks < 0 || weeks > 42) return showResult('Weeks pregnant must be between 0 and 42.');
            if (days < 0 || days > 6) return showResult('Days pregnant must be between 0 and 6.');

            const daysPregnant = (weeks * 7) + days;
            const eddDate = new Date(refDate);
            eddDate.setDate(eddDate.getDate() + 280 - daysPregnant);

            const lmpDate = new Date(refDate);
            lmpDate.setDate(lmpDate.getDate() - daysPregnant);

            const dateFormatter = new Intl.DateTimeFormat(undefined, { year: 'numeric', month: '2-digit', day: '2-digit' });
            let resultHtml = `Your Estimated Due Date is:<br><span class="result-date edd">${dateFormatter.format(eddDate)}</span>`;

            let actualDeliveryDate = null;
            let actualGA = null;

            const actualDateValue = actualDateInput.value;
            if (actualDateValue) {
                const [aYear, aMonth, aDay] = actualDateValue.split('-').map(Number);
                actualDeliveryDate = new Date(aYear, aMonth - 1, aDay);

                const diffDays = Math.round((actualDeliveryDate - lmpDate) / (1000 * 60 * 60 * 24));
                if (diffDays >= 0) {
                    actualGA = `${Math.floor(diffDays / 7)} weeks, ${diffDays % 7} days`;
                    resultHtml += `<br><br>Actual Delivery Date:<br><span class="result-date actual">${dateFormatter.format(actualDeliveryDate)}</span><br><span class="result-ga">GA: ${actualGA}</span>`;
                } else {
                    actualDeliveryDate = null;
                }
            }

            resultHtml += `<br><br>Last Menstrual Period (LMP):<br><span class="result-date lmp">${dateFormatter.format(lmpDate)}</span>`;

            showResult(resultHtml);
            renderTimeline(lmpDate, refDate, eddDate, actualDeliveryDate, actualGA);
        }

        [refDateInput, weeksInput, daysInput, actualDateInput].forEach(input => input.addEventListener('input', calculateEDD));

        const setMode = mode => {
            [refBtn, lmpBtn, eddBtn].forEach(btn => btn.classList.remove('active'));
            const isRef = mode === 'ref';

            weeksInput.disabled = daysInput.disabled = !isRef;
            if (mode === 'lmp') {
                lmpBtn.classList.add('active');
                weeksInput.value = daysInput.value = '0';
                refDateLabel.textContent = 'LMP (Last Menstrual Period) Date';
            } else if (mode === 'edd') {
                eddBtn.classList.add('active');
                weeksInput.value = '40'; daysInput.value = '0';
                refDateLabel.textContent = 'Estimated Due Date (EDD)';
            } else {
                refBtn.classList.add('active');
                refDateLabel.textContent = 'Reference Date';
            }
            calculateEDD();
        };

        refBtn.addEventListener('click', () => setMode('ref'));
        lmpBtn.addEventListener('click', () => setMode('lmp'));
        eddBtn.addEventListener('click', () => setMode('edd'));

        function renderTimeline(lmp, ref, edd, actual, actualGA) {
            timelineContainer.innerHTML = '';

            const timelineLine = document.createElement('div');
            timelineLine.className = 'timeline-line';
            timelineContainer.appendChild(timelineLine);

            const minTime = lmp.getTime();
            const maxTime = actual && actual > edd ? actual.getTime() : edd.getTime();
            const duration = maxTime - minTime;

            const dateFormatter = new Intl.DateTimeFormat(undefined, {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit'
            });

            function createPoint(date, className, labelHtml, isBottom) {
                let percentage = 15;
                if (duration > 0) {
                    percentage = 15 + ((date.getTime() - minTime) / duration) * 70;
                }

                const marker = document.createElement('div');
                marker.className = `timeline-marker ${className}`;
                marker.style.left = `${percentage}%`;

                if (labelHtml) {
                    const label = document.createElement('div');
                    label.className = `timeline-label ${isBottom ? 'bottom' : 'top'}`;
                    label.innerHTML = labelHtml;
                    marker.appendChild(label);
                }

                timelineContainer.appendChild(marker);
            }

            // 1. LMP Point (Bottom)
            const lmpLabel = `LMP (0w 0d)<br><span class="timeline-date lmp">${dateFormatter.format(lmp)}</span>`;
            createPoint(lmp, 'lmp-date', lmpLabel, true);

            // 2. EDD Point (Bottom)
            const eddLabel = `EDD (40w 0d)<br><span class="timeline-date edd">${dateFormatter.format(edd)}</span>`;
            createPoint(edd, 'edd-date', eddLabel, true);

            // 3. Reference Date Point (No label, just a dot)
            createPoint(ref, 'reference-date', null, false);

            // 4. Actual Delivery Point (Top, if present)
            if (actual) {
                let labelActual = 'Delivered';
                const formattedActualDate = dateFormatter.format(actual);
                if (actualGA) {
                    const match = actualGA.match(/(\d+)\s+weeks,\s+(\d+)\s+days/);
                    if (match) {
                        labelActual += `<br><span class="timeline-date actual">${formattedActualDate}</span>${match[1]}w ${match[2]}d`;
                    } else {
                        labelActual += `<br><span class="timeline-date actual">${formattedActualDate}</span>(${actualGA})`;
                    }
                } else {
                    labelActual += `<br><span class="timeline-date actual">${formattedActualDate}</span>`;
                }
                createPoint(actual, 'actual-delivery', labelActual, false);
            }
        }

        hideResult();
    </script>

</body>

</html>
